name: Kakao Daily Summary (KST 00:00)

on:
  schedule:
    - cron: "0 15 * * *"  # ✅ UTC 15:00 = KST 00:00(자정)
  workflow_dispatch:

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call summary endpoint
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/summary"
